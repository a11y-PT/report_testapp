name: Sync Project Fields

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  sync-fields:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync labels → project fields
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "🔍 A ler evento..."

          LABELS=$(jq -r '.issue.labels[].name' "$GITHUB_EVENT_PATH" | sed 's/[[:space:]]*$//')
          ISSUE_NODE_ID=$(jq -r '.issue.node_id' "$GITHUB_EVENT_PATH")
          REPO_NAME=$(jq -r '.repository.name' "$GITHUB_EVENT_PATH")
          ORG_NAME=$(jq -r '.repository.owner.login' "$GITHUB_EVENT_PATH")

          echo "Repo: $REPO_NAME"
          echo "Labels:"
          echo "$LABELS"

          # -------------------------
          # DESCOBRIR PROJECT
          # -------------------------
          echo "🔍 Procurar project..."

          PROJECTS_JSON=$(gh api graphql -f query='
          query($org: String!) {
            organization(login: $org) {
              projectsV2(first: 50) {
                nodes {
                  id
                  title
                }
              }
            }
          }' -f org=$ORG_NAME)

          PROJECT_ID=$(echo "$PROJECTS_JSON" | jq -r --arg name "$REPO_NAME" '
            .data.organization.projectsV2.nodes[]
            | select(.title | ascii_downcase | startswith($name | ascii_downcase))
            | .id
          ' | head -n1)

          echo "📌 PROJECT_ID: $PROJECT_ID"

          if [ -z "$PROJECT_ID" ]; then
            echo "❌ Project não encontrado"
            exit 1
          fi

          # -------------------------
          # NORMALIZAR LABELS
          # -------------------------
          NORMALIZED_LABELS=$(echo "$LABELS" | iconv -f utf8 -t ascii//TRANSLIT | tr '[:upper:]' '[:lower:]')

          echo "🔤 Labels normalizados:"
          echo "$NORMALIZED_LABELS"

          # -------------------------
          # DETETAR CHECK_KEY (FIX)
          # -------------------------
          CHECK_KEY=""

          while IFS= read -r key; do
            if echo "$NORMALIZED_LABELS" | grep -qw "$key"; then
              CHECK_KEY=$key
              break
            fi
          done < <(jq -r 'keys[]' .config/mapping.json)

          echo "📌 CHECK_KEY: $CHECK_KEY"

          if [ -z "$CHECK_KEY" ]; then
            echo "⚠️ Nenhuma checklist reconhecida — abortar"
            exit 0
          fi

          # -------------------------
          # EXTRAIR R
          # -------------------------
          R_NUMBER=$(echo "$LABELS" | grep -oE 'R [0-9]+' | head -n1 | cut -d' ' -f2)

          echo "🔢 R_NUMBER: $R_NUMBER"

          if [ -z "$R_NUMBER" ]; then
            echo "⚠️ Sem label R — abortar"
            exit 0
          fi

          # -------------------------
          # LER MAPPING
          # -------------------------
          FIELD_NAME=$(jq -r --arg key "$CHECK_KEY" '.[$key].field' .config/mapping.json)

          OPTION_NAME=$(jq -r --arg key "$CHECK_KEY" --arg num "$R_NUMBER" \
            '.[$key].options[$num]' .config/mapping.json)

          echo "📌 FIELD_NAME: $FIELD_NAME"
          echo "🎯 OPTION_NAME: $OPTION_NAME"

          if [ "$FIELD_NAME" == "null" ] || [ "$OPTION_NAME" == "null" ]; then
            echo "⚠️ Mapping não encontrado — abortar"
            exit 0
          fi

          # -------------------------
          # OBTER FIELDS DO PROJECT
          # -------------------------
          echo "📡 Obter fields do project..."

          FIELDS_JSON=$(gh api graphql -f query='
          query($project: ID!) {
            node(id: $project) {
              ... on ProjectV2 {
                fields(first: 50) {
                  nodes {
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                      options {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }
          }' -f project=$PROJECT_ID)

          # -------------------------
          # RESOLVER FIELD_ID
          # -------------------------
          FIELD_ID=$(echo "$FIELDS_JSON" | jq -r --arg name "$FIELD_NAME" '
            .data.node.fields.nodes[]
            | select(.name == $name)
            | .id
          ')

          # -------------------------
          # RESOLVER OPTION_ID (FIX jq)
          # -------------------------
          OPTION_ID=$(echo "$FIELDS_JSON" | jq -r \
            --arg fname "$FIELD_NAME" \
            --arg oname "$OPTION_NAME" '
            def norm(s): s | ascii_downcase | gsub("–"; "-");

            .data.node.fields.nodes[]
            | select(.name == $fname)
            | .options[]
            | select(norm(.name) == norm($oname))
            | .id
          ')

          echo "🧩 FIELD_ID: $FIELD_ID"
          echo "🎯 OPTION_ID: $OPTION_ID"

          if [ -z "$FIELD_ID" ] || [ -z "$OPTION_ID" ]; then
            echo "❌ Não foi possível resolver IDs"
            exit 1
          fi

          # -------------------------
          # ADICIONAR AO PROJECT
          # -------------------------
          echo "➕ Adicionar ao project..."

          ITEM_ID=$(gh api graphql -f query='
            mutation($project:ID!, $content:ID!) {
              addProjectV2ItemById(input:{
                projectId:$project,
                contentId:$content
              }) {
                item { id }
              }
            }' \
            -f project=$PROJECT_ID \
            -f content=$ISSUE_NODE_ID \
            --jq '.data.addProjectV2ItemById.item.id')

          echo "📦 ITEM_ID: $ITEM_ID"

          # -------------------------
          # ATUALIZAR FIELD
          # -------------------------
          echo "✏️ Atualizar field..."

          gh api graphql -f query='
            mutation($project:ID!, $item:ID!, $field:ID!, $option: String!) {
              updateProjectV2ItemFieldValue(input:{
                projectId:$project,
                itemId:$item,
                fieldId:$field,
                value:{ singleSelectOptionId:$option }
              }) { clientMutationId }
            }' \
            -f project=$PROJECT_ID \
            -f item=$ITEM_ID \
            -f field=$FIELD_ID \
            -f option=$OPTION_ID

          echo "✅ Done"